<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Parking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1 id="app-title">AIParking</h1>
            </div>
            
            <nav class="floor-nav">
                <button class="nav-btn active" data-floor="1">
                    <span class="floor-num">1</span>
                    <span class="floor-label">Ground Floor</span>
                </button>
                <button class="nav-btn" data-floor="2">
                    <span class="floor-num">2</span>
                    <span class="floor-label">Second Floor</span>
                </button>
                <button class="nav-btn" data-floor="3">
                    <span class="floor-num">3</span>
                    <span class="floor-label">Third Floor</span>
                </button>
                <button class="nav-btn vip-btn" data-floor="4">
                    <span class="floor-num">★</span>
                    <span class="floor-label">VIP Lounge</span>
                </button>
            </nav>

            <div class="db-status">
                <div class="status-indicator live"></div>
                <span>Firebase Connected (Simulated)</span>
            </div>

            <div class="mode-toggle">
                <button id="manual-mode-btn" class="toggle-btn">
                    <span class="toggle-icon">🤖</span>
                    <span id="mode-text">Switch to Manual</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="dashboard-header">
                <div class="stat-card total-spots">
                    <h3>Total Capacity</h3>
                    <p class="stat-value">320</p>
                </div>
                <div class="stat-card free-spots">
                    <h3>Available Spots</h3>
                    <p class="stat-value" id="global-free-count">--</p>
                </div>
                <div class="stat-card occupied-spots">
                    <h3>Occupied</h3>
                    <p class="stat-value" id="global-occupied-count">--</p>
                </div>
            </header>

            <section class="parking-map-container">
                <div class="map-header">
                    <h2 id="current-floor-title">Ground Floor Layout</h2>
                    <div class="legend">
                        <div class="legend-item"><div class="spot-indicator free"></div> Free</div>
                        <div class="legend-item"><div class="spot-indicator occupied"></div> Occupied</div>
                        <div class="legend-item"><div class="spot-indicator vip"></div> VIP</div>
                    </div>
                </div>
                
                <div class="parking-grid" id="parking-grid">
                    <!-- Parking spots generated by JS -->
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
